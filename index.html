<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Sheeb</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --card:#111;
  --border:#222;
  --text:#fff;
  --soft:#aaa;
  --accent:#e50914;
  --chip:#1a1a1a;

  --online:#43b581;
  --idle:#faa61a;
  --dnd:#f04747;
  --offline:#747f8d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  color:var(--text);
  background:#000;
}

a{ text-decoration:none; color:inherit; }

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  border-bottom:1px solid #222;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.menu-toggle{
  display:none;
  flex-direction:column;
  gap:4px;
  cursor:pointer;
}

.menu-toggle span{
  width:20px;
  height:2px;
  background:#fff;
}

.nav{
  display:flex;
  gap:20px;
}

.nav a{
  color:#fff;
  position:relative;
}

.nav a:hover{ color:#e50914; }

.nav a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:0;
  width:0;
  height:2px;
  background:#e50914;
  transition:0.3s;
}

.nav a:hover::after{ width:100%; }

@media(max-width:768px){
  .menu-toggle{display:flex;}
  .nav{
    position:absolute;
    top:60px;
    left:0;
    right:0;
    background:#000;
    flex-direction:column;
    display:none;
    padding:10px;
  }
  .nav.open{display:flex;}
}

.hero{
  text-align:center;
  padding:40px 20px;
}

.hero img{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #e50914;
}

.hero h1{
  font-size:28px;
  margin-top:10px;
}

.hero span{color:#e50914;}

.hero-line{
  width:80px;
  height:3px;
  background:#e50914;
  margin:10px auto;
}

.discord-title{
  margin:20px;
  font-weight:600;
}

.discord-card{
  margin:20px;
  padding:20px;
  border:1px solid #222;
  border-radius:15px;
  background:#111;
}

.profile{
  display:flex;
  gap:15px;
}

.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  position:relative;
}

.avatar img{
  width:100%;
  border-radius:50%;
}

.status-dot{
  width:15px;
  height:15px;
  border-radius:50%;
  position:absolute;
  bottom:0;
  right:0;
  border:3px solid #111;
}

.online{background:#43b581;}
.idle{background:#faa61a;}
.dnd{background:#f04747;}
.offline{background:#747f8d;}

.display-name{
  font-size:20px;
  font-weight:600;
}

.chips{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:nowrap;
}

.chip{
  display:flex;
  align-items:center;
  gap:6px;
  background:#1a1a1a;
  padding:6px 12px;
  border-radius:10px;
  font-size:14px;
  white-space:nowrap;
}

.mini-dot{
  width:8px;
  height:8px;
  border-radius:50%;
}

@media(max-width:480px){
  .chips{ flex-wrap:wrap; }
}

.social{
  text-align:center;
  margin-top:30px;
}

.social span{color:#e50914;}

.icons{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  padding:10px;
}

.icons a{
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid #222;
  border-radius:10px;
  color:#e50914;
}

footer{
  text-align:center;
  margin-top:40px;
  padding:20px;
  color:#aaa;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<header>
  <div class="logo">Mohammed Sheeb</div>

  <div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav class="nav" id="nav">
    <a href="#">About Me</a>
    <a href="#">Social Media</a>
  </nav>
</header>

<section class="hero">
  <!-- ✅ صورتك -->
  <img src="profile.jpg" alt="Profile">

  <h1>Mohammed <span>Sheeb</span></h1>
  <div class="hero-line"></div>
</section>

<div class="discord-title">
  <i class="fab fa-discord"></i> Discord
</div>

<div class="discord-card">
  <div class="profile">
    <div class="avatar">
      <img id="avatar" src="">
      <div id="dot" class="status-dot offline"></div>
    </div>

    <div>
      <div id="displayName" class="display-name">Loading...</div>

      <div class="chips">
        <div class="chip">
          <span id="tag">@username</span>
        </div>

        <div class="chip">
          <span id="statusMiniDot" class="mini-dot offline"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>
  </div>
</div>

<section class="social">
  <h2>Social <span>Media</span></h2>

  <div class="icons">
    <a href="#"><i class="fas fa-envelope"></i></a>
    <a href="#"><i class="fab fa-discord"></i></a>
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-youtube"></i></a>
    <a href="#"><i class="fab fa-tiktok"></i></a>
    <a href="#"><i class="fab fa-x-twitter"></i></a>
  </div>
</section>

<footer>
  &copy; 2026 Mohammed Sheeb
</footer>

<script>
const userId = "1481454957512101950";

async function loadDiscord(){
  const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
  const data = await res.json();

  const user = data.data.discord_user;
  const status = data.data.discord_status;

  document.getElementById("avatar").src =
    `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;

  document.getElementById("displayName").innerText =
    user.global_name || user.username;

  document.getElementById("tag").innerText = "@" + user.username;

  document.getElementById("dot").className = "status-dot " + status;
  document.getElementById("statusMiniDot").className = "mini-dot " + status;

  document.getElementById("statusText").innerText =
    status === "online" ? "Online" :
    status === "idle" ? "Idle" :
    status === "dnd" ? "Do Not Disturb" : "Offline";
}

loadDiscord();
setInterval(loadDiscord,30000);

document.getElementById("menuToggle").onclick = () =>{
  document.getElementById("nav").classList.toggle("open");
}
</script>

</body>
</html>
